# Oracle Cloud Always Free — ESP32 PM Monitor
# Run setup.sh once to bootstrap, then manage with:
#   docker compose up -d    (start)
#   docker compose down     (stop)
#   docker compose logs -f  (tail logs)

services:

  # ── Backend (reuses existing Dockerfile; build context = esp32-pm-monitor/) ──
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DB_PATH: /data/pm_data.db
    volumes:
      - /data/pm_data:/data
    expose:
      - "8000"
    networks:
      - internal

  # ── nginx reverse proxy with HTTPS ───────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    networks:
      - internal
    depends_on:
      - backend

  # ── Certbot renewal daemon (checks every 12 h) ───────────────────────────────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "trap exit TERM;
                  while :; do
                    certbot renew --webroot -w /var/www/certbot --quiet;
                    sleep 12h & wait $${!};
                  done"

volumes:
  certbot_www:
  certbot_certs:

networks:
  internal:
    driver: bridge
