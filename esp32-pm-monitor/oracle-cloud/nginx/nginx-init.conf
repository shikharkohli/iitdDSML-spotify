# Temporary HTTP-only config used by setup.sh during initial cert issuance.
# setup.sh replaces this with the HTTPS config once the cert is obtained.

server {
    listen 80;
    server_name _;

    # ACME challenge directory for certbot webroot auth
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 "PM Monitor — TLS setup in progress\n";
        add_header Content-Type text/plain;
    }
}
