# Fly.io deployment configuration
# Deploy with: fly launch --config fly.toml
# Free tier: 3 shared-cpu-1x 256 MB VMs + 3 GB volumes

app = "pm-monitor"
primary_region = "sin"   # Singapore — change to nearest: bom, sin, nrt, lhr, iad

[build]
  dockerfile = "backend/Dockerfile"

[mounts]
  source = "pm_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https   = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[env]
  DB_PATH     = "/data/pm_data.db"
  MAX_RECORDS = "10000"
  # Set secrets via CLI:
  # fly secrets set API_KEY=your-secret DASH_USER=admin DASH_PASS=your-pass
