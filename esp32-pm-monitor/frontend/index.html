<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0f1117" />
<title>PM Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-2: #232735;
    --border: #2d3148;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #4f8ef7;
    --good: #34d399;
    --warn: #fbbf24;
    --bad: #f87171;
    --hazard: #a78bfa;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  h1 { margin: 0; font-size: 18px; font-weight: 600; }
  .status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .dot.live { background: var(--good); box-shadow: 0 0 8px var(--good); }
  .dot.stale { background: var(--warn); }
  .dot.error { background: var(--bad); }
  main {
    padding: 16px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  button {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    min-height: 38px;
  }
  button:hover { background: var(--surface-2); }
  button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
  }
  .card .label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .card .value {
    font-size: 28px;
    font-weight: 600;
    line-height: 1;
  }
  .card .unit {
    font-size: 12px;
    color: var(--muted);
    margin-left: 4px;
  }
  .card .badge {
    display: inline-block;
    margin-top: 8px;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
  }
  .badge.good { background: rgba(52,211,153,.15); color: var(--good); }
  .badge.warn { background: rgba(251,191,36,.15); color: var(--warn); }
  .badge.bad { background: rgba(248,113,113,.15); color: var(--bad); }
  .badge.hazard { background: rgba(167,139,250,.15); color: var(--hazard); }
  .chart-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .chart-wrap h2 {
    margin: 0 0 12px;
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
  }
  .chart-canvas {
    position: relative;
    height: 280px;
    width: 100%;
  }
  .meta {
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
  }
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  @media (max-width: 480px) {
    h1 { font-size: 16px; }
    .card .value { font-size: 22px; }
    .chart-canvas { height: 220px; }
    main { padding: 12px; }
  }
</style>
</head>
<body>
<header>
  <h1>PM Monitor</h1>
  <div class="status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Loading…</span>
  </div>
</header>

<main>
  <div class="controls" role="group" aria-label="Time range">
    <button data-hours="1">1h</button>
    <button data-hours="6">6h</button>
    <button data-hours="24" class="active">24h</button>
    <button data-hours="168">7d</button>
    <button data-hours="">All</button>
  </div>

  <div class="cards" id="cards">
    <div class="card"><div class="label">PM1.0</div><div class="value">—</div></div>
    <div class="card"><div class="label">PM2.5</div><div class="value">—</div></div>
    <div class="card"><div class="label">PM10</div><div class="value">—</div></div>
    <div class="card"><div class="label">Interval</div><div class="value">—</div></div>
  </div>

  <div class="chart-wrap">
    <h2>PM concentration (µg/m³)</h2>
    <div class="chart-canvas"><canvas id="pmChart"></canvas></div>
  </div>

  <div class="chart-wrap">
    <h2>Particle counts (per 0.1L)</h2>
    <div class="chart-canvas"><canvas id="cntChart"></canvas></div>
  </div>

  <div class="meta">
    <span id="lastSeen">No data yet</span>
    <span id="rowCount"></span>
  </div>
</main>

<script>
const REFRESH_MS = 15000;
let currentHours = 24;
let pmChart, cntChart;

const $ = (id) => document.getElementById(id);

function pm25Badge(v) {
  if (v == null) return '';
  if (v <= 12)  return '<span class="badge good">Good</span>';
  if (v <= 35)  return '<span class="badge warn">Moderate</span>';
  if (v <= 55)  return '<span class="badge bad">Unhealthy (sensitive)</span>';
  if (v <= 150) return '<span class="badge bad">Unhealthy</span>';
  return '<span class="badge hazard">Hazardous</span>';
}

function setStatus(state, text) {
  const dot = $('statusDot');
  dot.className = 'dot ' + state;
  $('statusText').textContent = text;
}

function renderCards(latest, intervalSec) {
  const cards = $('cards');
  if (!latest) {
    cards.innerHTML = '<div class="empty" style="grid-column: 1/-1">No readings yet. Power on the ESP32.</div>';
    return;
  }
  cards.innerHTML = `
    <div class="card">
      <div class="label">PM1.0</div>
      <div class="value">${latest.pm1_0_atm}<span class="unit">µg/m³</span></div>
    </div>
    <div class="card">
      <div class="label">PM2.5</div>
      <div class="value">${latest.pm2_5_atm}<span class="unit">µg/m³</span></div>
      ${pm25Badge(latest.pm2_5_atm)}
    </div>
    <div class="card">
      <div class="label">PM10</div>
      <div class="value">${latest.pm10_atm}<span class="unit">µg/m³</span></div>
    </div>
    <div class="card">
      <div class="label">Interval</div>
      <div class="value">${intervalSec ?? '—'}<span class="unit">s</span></div>
    </div>
  `;
}

function buildLine(label, color) {
  return {
    label, data: [], borderColor: color,
    backgroundColor: color + '33',
    borderWidth: 2, tension: 0.3,
    pointRadius: 0, pointHoverRadius: 4,
    fill: false,
  };
}

function chartOpts(yLabel) {
  return {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { labels: { color: '#94a3b8', boxWidth: 12, font: { size: 11 } } },
      tooltip: { backgroundColor: '#1a1d27', titleColor: '#e2e8f0', bodyColor: '#e2e8f0' },
    },
    scales: {
      x: {
        type: 'time',
        time: { tooltipFormat: 'PPpp' },
        ticks: { color: '#94a3b8', maxRotation: 0, autoSkipPadding: 20 },
        grid: { color: 'rgba(45,49,72,.4)' },
      },
      y: {
        title: { display: true, text: yLabel, color: '#94a3b8' },
        ticks: { color: '#94a3b8' },
        grid: { color: 'rgba(45,49,72,.4)' },
        beginAtZero: true,
      },
    },
  };
}

function initCharts() {
  pmChart = new Chart($('pmChart'), {
    type: 'line',
    data: { datasets: [
      buildLine('PM1.0', '#4f8ef7'),
      buildLine('PM2.5', '#fbbf24'),
      buildLine('PM10',  '#f87171'),
    ]},
    options: chartOpts('µg/m³'),
  });
  cntChart = new Chart($('cntChart'), {
    type: 'line',
    data: { datasets: [
      buildLine('>0.3µm', '#34d399'),
      buildLine('>0.5µm', '#4f8ef7'),
      buildLine('>1.0µm', '#fbbf24'),
      buildLine('>2.5µm', '#f87171'),
      buildLine('>5.0µm', '#a78bfa'),
    ]},
    options: chartOpts('count / 0.1L'),
  });
}

function updateCharts(rows) {
  const sorted = [...rows].sort((a, b) => a.ts - b.ts);
  const t = sorted.map(r => new Date(r.ts * 1000));
  const pt = (k) => sorted.map(r => ({ x: new Date(r.ts * 1000), y: r[k] }));

  pmChart.data.datasets[0].data = pt('pm1_0_atm');
  pmChart.data.datasets[1].data = pt('pm2_5_atm');
  pmChart.data.datasets[2].data = pt('pm10_atm');
  pmChart.update('none');

  cntChart.data.datasets[0].data = pt('cnt_0_3um');
  cntChart.data.datasets[1].data = pt('cnt_0_5um');
  cntChart.data.datasets[2].data = pt('cnt_1_0um');
  cntChart.data.datasets[3].data = pt('cnt_2_5um');
  cntChart.data.datasets[4].data = pt('cnt_5_0um');
  cntChart.update('none');
}

async function fetchAll() {
  try {
    const qs = currentHours ? `?hours=${currentHours}&limit=2000` : `?limit=2000`;
    const [dataRes, cfgRes] = await Promise.all([
      fetch('/api/data' + qs),
      fetch('/api/config'),
    ]);
    if (!dataRes.ok) throw new Error('data ' + dataRes.status);
    const rows = await dataRes.json();
    const cfg = cfgRes.ok ? await cfgRes.json() : {};
    const latest = rows[0];
    renderCards(latest, cfg.interval_sec);
    updateCharts(rows);
    $('rowCount').textContent = `${rows.length} reading${rows.length === 1 ? '' : 's'}`;
    if (latest) {
      const ageSec = Date.now() / 1000 - latest.ts;
      const expected = (cfg.interval_sec || 1800) * 2;
      const live = ageSec < expected;
      setStatus(live ? 'live' : 'stale', live ? 'Live' : 'Stale');
      $('lastSeen').textContent = 'Last reading ' + new Date(latest.ts * 1000).toLocaleString();
    } else {
      setStatus('stale', 'Waiting for data');
    }
  } catch (e) {
    setStatus('error', 'Connection error');
    console.error(e);
  }
}

document.querySelectorAll('.controls button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const h = btn.dataset.hours;
    currentHours = h ? parseInt(h, 10) : null;
    fetchAll();
  });
});

initCharts();
fetchAll();
setInterval(fetchAll, REFRESH_MS);
</script>
</body>
</html>
